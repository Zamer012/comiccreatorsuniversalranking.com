<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurable Leaderboard</title>
<style>
а body {
а а font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
а а background: #f0f2f5;
а а display: flex;
а а flex-direction: column;
а а align-items: center;
а а padding: 50px 20px;
а }

а h1 {
а а color: #333;
а а margin-bottom: 40px;
а а text-transform: uppercase;
а а letter-spacing: 1px;
а }

а table {
а а border-collapse: collapse;
а а width: 80%;
а а max-width: 700px;
а а background: #fff;
а а box-shadow: 0 8px 20px rgba(0,0,0,0.1);
а а border-radius: 8px;
а а overflow: hidden;
а }

а th, td {
а а padding: 15px 25px;
а а border-bottom: 1px solid #ddd;
а а text-align: left;
а а transition: all 0.3s ease;
а }

а th {
а а background-color: #333;
а а color: #fff;
а а font-size: 1.1em;
а а letter-spacing: 1px;
а }

а tr:nth-child(even) {
а а background-color: #f9f9f9;
а }

а tr:hover {
а а background-color: #a8d0e6;
а а transform: scale(1.02);
а }

а tr {
а а transition: background-color 0.3s ease, transform 0.3s ease;
а }
</style>
</head>
<body>

<h1>My Configurable Leaderboard</h1>

<table id="leaderboard">
а <tr>
а а <th>Rank</th>
а а <th>Name</th>
а </tr>
</table>

<script>
а // ===== CONFIGURE YOUR PLAYERS HERE =====
а const players = [
а а "Alice",
а а "Bob",
а а "Charlie",
а а "David",
а а "Eve",
а а "Frank"
а ];

а const table = document.getElementById("leaderboard");

а players.forEach((player, index) => {
а а const row = document.createElement("tr");
а аа
а а // Rank
а а const rankCell = document.createElement("td");
а а rankCell.textContent = index + 1;
а а row.appendChild(rankCell);

а а // Name
а а const nameCell = document.createElement("td");
а а nameCell.textContent = player;
а а row.appendChild(nameCell);

а а // Highlight top 3
а а if(index === 0) row.style.backgroundColor = "#ffd700"; // Gold
а а if(index === 1) row.style.backgroundColor = "#c0c0c0"; // Silver
а а if(index === 2) row.style.backgroundColor = "#cd7f32"; // Bronze

а а table.appendChild(row);
а });
</script>

</body>
</html>
